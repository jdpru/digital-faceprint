<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" width="720" height="300" role="img" aria-label="Mediation path model: intervention engagement X acts on behavior Y directly along path c-prime and indirectly through neural change M along paths a and b.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#474c56" />
    </marker>
    <style>
      .node { fill: #f6f7f9; stroke: #22529c; stroke-width: 1.6; }
      .var  { font-family: 'Newsreader', Georgia, 'Times New Roman', serif; font-style: italic; font-size: 32px; fill: #22529c; text-anchor: middle; }
      .cap  { font-family: 'Newsreader', Georgia, 'Times New Roman', serif; font-size: 14px; fill: #474c56; text-anchor: middle; }
      .path { fill: none; stroke: #474c56; stroke-width: 1.6; }
      .plbl { font-family: 'Newsreader', Georgia, 'Times New Roman', serif; font-style: italic; font-size: 22px; fill: #22529c; text-anchor: middle; }
    </style>
  </defs>

  <!-- edges -->
  <path class="path" d="M152,188 L328,95"  marker-end="url(#arrow)" />
  <path class="path" d="M392,95 L568,188"  marker-end="url(#arrow)" />
  <path class="path" d="M156,205 L564,205" marker-end="url(#arrow)" />

  <!-- path labels -->
  <text class="plbl" x="224" y="128">a</text>
  <text class="plbl" x="496" y="128">b</text>
  <text class="plbl" x="360" y="232">c&#8242;</text>

  <!-- nodes -->
  <circle class="node" cx="120" cy="205" r="36" />
  <circle class="node" cx="360" cy="78"  r="36" />
  <circle class="node" cx="600" cy="205" r="36" />

  <text class="var" x="120" y="216">X</text>
  <text class="var" x="360" y="89">M</text>
  <text class="var" x="600" y="216">Y</text>

  <!-- captions -->
  <text class="cap" x="120" y="266">Intervention engagement</text>
  <text class="cap" x="360" y="30">Neural change</text>
  <text class="cap" x="600" y="266">Behavior change</text>
</svg>
